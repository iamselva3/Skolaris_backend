services:
  db:
    image: postgres:15-alpine
    container_name: skolaris-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: skolaris
      POSTGRES_PASSWORD: skolaris
      POSTGRES_DB: skolaris
    ports:
      - "5434:5432"
    volumes:
      - skolaris_pg_data:/var/lib/postgresql/data
      - ./prisma/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U skolaris -d skolaris"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: skolaris-redis
    restart: unless-stopped
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  mailhog:
    image: mailhog/mailhog:latest
    container_name: skolaris-mailhog
    restart: unless-stopped
    ports:
      - "1026:1025"   # SMTP (use 1026 from host to avoid conflict with native SMTP)
      - "8026:8025"   # Web UI: http://localhost:8026

  # Mock OCR worker — stands in for the real Python OCR microservice. Consumes
  # the BullMQ ocr.extract queue and POSTs canned drafts back to the API after a
  # short pause. Reuses the API image (same node_modules + ts-node). Replace
  # with the real FastAPI/PaddleOCR service when ready by swapping the command.
  ocr-mock:
    build: .
    container_name: skolaris-ocr-mock
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
      api:
        condition: service_started
    environment:
      REDIS_URL: redis://redis:6379
      OCR_QUEUE_NAME: ocr.extract
      OCR_CALLBACK_URL: http://api:3000/api/internal/ocr/callback
      OCR_CALLBACK_SECRET: ${OCR_CALLBACK_SECRET:-dev-ocr-callback-secret-change-me}
      OCR_MOCK_DELAY_MS: ${OCR_MOCK_DELAY_MS:-3000}
    command: ["npm", "run", "ocr:mock"]

  # Optional Python handwriting-OCR fallback. Behind the 'handwriting' profile,
  # so plain `docker compose up` does NOT start it. Enable with:
  #   HANDWRITING_OCR_ENABLED=true docker compose --profile handwriting up
  # Default build is the lean stub engine (contract testing, no models); build a
  # real engine with: docker compose build --build-arg INSTALL_ML=paddle ocr-handwriting
  ocr-handwriting:
    build:
      context: ./ocr-handwriting
      args:
        INSTALL_ML: ${HW_OCR_INSTALL_ML:-none}
    container_name: skolaris-ocr-handwriting
    restart: unless-stopped
    profiles: ["handwriting"]
    depends_on:
      redis:
        condition: service_healthy
      api:
        condition: service_started
    environment:
      REDIS_URL: redis://redis:6379
      HW_OCR_QUEUE_NAME: ocr.handwriting
      OCR_CALLBACK_URL: http://api:3000/api/internal/ocr/callback
      OCR_CALLBACK_SECRET: ${OCR_CALLBACK_SECRET:-dev-ocr-callback-secret-change-me}
      # Python service fetches object bytes via the backend read-proxy (S3/R2-backed).
      AWS_S3_BUCKET: skolaris-uploads
      STORAGE_READ_BASE_URL: http://api:3000/api
      HW_OCR_MODEL: ${HW_OCR_MODEL:-stub}
      HW_OCR_DEVICE: ${HW_OCR_DEVICE:-cpu}
    ports:
      - "8001:8001"

  api:
    build: .
    container_name: skolaris-api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173}
      DATABASE_URL: postgresql://neondb_owner:npg_kRYIreSOW0j1@ep-fragrant-firefly-aph8n88b-pooler.c-7.us-east-1.aws.neon.tech/neondb?sslmode=require&channel_binding=require
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-dev-access-secret-change-me-please}
      JWT_ACCESS_TTL: ${JWT_ACCESS_TTL:-15m}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-dev-refresh-secret-change-me-please}
      JWT_REFRESH_TTL: ${JWT_REFRESH_TTL:-7d}
      REDIS_URL: redis://redis:6379
      OCR_QUEUE_NAME: ocr.extract
      OCR_CALLBACK_SECRET: ${OCR_CALLBACK_SECRET:-dev-ocr-callback-secret-change-me}
      # OCR consumer topology (see .env.example). Default 'api' = the separate
      # ocr-mock service below drains the queue. Set WORKER_MODE=both for a
      # single-service deploy (API + in-process OCR) and remove the ocr-mock service.
      WORKER_MODE: ${WORKER_MODE:-api}
      # Handwriting fallback (default OFF). Set true AND start the ocr-handwriting
      # service (--profile handwriting) to route handwritten/low-confidence jobs.
      HANDWRITING_OCR_ENABLED: ${HANDWRITING_OCR_ENABLED:-false}
      HW_OCR_QUEUE_NAME: ocr.handwriting
      # Dispatch: 'queue' (default; ocr-handwriting consumes) or 'http' (API calls
      # the service directly — no consumer needed). URL used only in http mode.
      HW_OCR_DISPATCH: ${HW_OCR_DISPATCH:-queue}
      HANDWRITING_OCR_URL: ${HANDWRITING_OCR_URL:-http://ocr-handwriting:8001}
      # Storage: S3/R2-only. Dev uses MinIO (always-on below) as an R2 stand-in.
      # For real Cloudflare R2 set S3_ENDPOINT=https://<acct>.r2.cloudflarestorage.com
      # + the R2 token in AWS_ACCESS_KEY_ID/AWS_SECRET_ACCESS_KEY.
      STORAGE_PROVIDER: ${STORAGE_PROVIDER:-s3}
      AWS_S3_BUCKET: ${AWS_S3_BUCKET:-skolaris-uploads}
      AWS_REGION: ${AWS_REGION:-auto}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-minioadmin}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-minioadmin}
      # Internal endpoint (server-side ops) vs browser-reachable endpoint (presigned uploads).
      S3_ENDPOINT: ${S3_ENDPOINT:-http://minio:9000}
      S3_PUBLIC_ENDPOINT: ${S3_PUBLIC_ENDPOINT:-http://localhost:9000}
      S3_FORCE_PATH_STYLE: ${S3_FORCE_PATH_STYLE:-true}
      # Read-proxy base for the DI-less standalone OCR worker only (in-process reads via the adapter).
      STORAGE_READ_BASE_URL: ${STORAGE_READ_BASE_URL:-http://api:3000/api}
      SMTP_HOST: mailhog
      SMTP_PORT: 1025
      SMTP_FROM: no-reply@skolaris.local
      ANALYTICS_QUEUE_NAME: analytics.aggregate
      NOTIFICATIONS_QUEUE_NAME: notifications.dispatch
    ports:
      - "3000:3000"
    command: sh -c "npx prisma migrate deploy && node dist/main.js"

  # Local S3-compatible storage (MinIO) — the default dev stand-in for Cloudflare
  # R2 (SKOLARIS is S3/R2-only). Always-on, so plain `docker compose up` gives the
  # API a working bucket. For real R2, leave MinIO running locally or point the
  # API's S3_ENDPOINT at https://<acct>.r2.cloudflarestorage.com instead.
  minio:
    image: minio/minio:latest
    container_name: skolaris-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${AWS_ACCESS_KEY_ID:-minioadmin}
      MINIO_ROOT_PASSWORD: ${AWS_SECRET_ACCESS_KEY:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - skolaris_minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10

  # One-shot: create the bucket and allow anonymous download (mirrors the
  # current unauthenticated read posture served by the backend read-proxy).
  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_started
    entrypoint:
      - /bin/sh
      - -c
      - |
        sleep 3 &&
        mc alias set local http://minio:9000 ${AWS_ACCESS_KEY_ID:-minioadmin} ${AWS_SECRET_ACCESS_KEY:-minioadmin} &&
        mc mb -p local/${AWS_S3_BUCKET:-skolaris-uploads} &&
        mc anonymous set download local/${AWS_S3_BUCKET:-skolaris-uploads} &&
        echo "minio bucket ready"

volumes:
  skolaris_pg_data:
  skolaris_minio_data:
